<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>アイプリチャレンジマップ</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script defer src="data.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <p class="kicker">全国版</p>
          <h1>アイプリチャレンジマップ</h1>
        </div>
        <div class="source-box">
          <span id="sourceStamp">公式取得日時を読み込み中</span>
          <div class="source-actions">
            <a id="sourceLink" href="https://aipri.jp/event/search.html?event_id=9" target="_blank" rel="noopener">公式</a>
            <button id="refreshBtn" class="icon-button source-refresh" type="button" title="最新情報を取得" aria-label="最新情報を取得">
              <svg class="material-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.73 10h-2.08A6.004 6.004 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h8V3l-3.35 3.35Z"></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <section class="controls" aria-label="検索条件">
        <label class="field search-field">
          <span>検索</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="店舗名・住所・備考">
        </label>

        <div class="field field-group date-field">
          <span>開催日</span>
          <div id="dateFilter" class="segmented date-segmented" role="group" aria-label="開催日"></div>
        </div>

        <div class="field field-group">
          <span>年齢制限</span>
          <div class="segmented" role="group" aria-label="年齢制限">
            <button class="is-active" type="button" data-age="all">すべて</button>
            <button type="button" data-age="年齢無制限">無制限</button>
            <button type="button" data-age="中学生以下">中学生以下</button>
          </div>
        </div>

        <div class="field field-group time-field">
          <span>参加受付時間帯</span>
          <div id="timeFilter" class="segmented compact-segmented" role="group" aria-label="参加受付時間帯">
            <button class="is-active" type="button" data-time="all">すべて</button>
            <button type="button" data-time="morning">午前</button>
            <button type="button" data-time="midday">12-13時台</button>
            <button type="button" data-time="late">14時以降</button>
          </div>
        </div>

        <div class="field field-group sort-field">
          <span>並び順</span>
          <div id="sortMode" class="segmented compact-segmented" role="group" aria-label="並び順">
            <button class="is-active" type="button" data-sort="date">日付</button>
            <button type="button" data-sort="distance">距離</button>
            <button type="button" data-sort="name">店舗名</button>
          </div>
        </div>

        <div class="toolbox">
          <div class="field view-field">
            <span>表示切替</span>
            <div class="segmented view-switch" role="group" aria-label="表示切替">
              <button id="listViewBtn" class="is-active" type="button" data-view="list">一覧</button>
              <button id="mapViewBtn" type="button" data-view="map">地図</button>
            </div>
          </div>
          <button id="locateBtn" class="icon-button" type="button" title="現在地を表示" aria-label="現在地を表示">
            <svg class="material-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm8.94 3A9.004 9.004 0 0 0 13 3.06V1h-2v2.06A9.004 9.004 0 0 0 3.06 11H1v2h2.06A9.004 9.004 0 0 0 11 20.94V23h2v-2.06A9.004 9.004 0 0 0 20.94 13H23v-2h-2.06ZM12 19a7 7 0 1 1 0-14 7 7 0 0 1 0 14Z"></path>
            </svg>
          </button>
        </div>
      </section>

      <section class="summary-strip" aria-live="polite">
        <div>
          <strong id="resultCount">0店舗</strong>
          <span id="eventCount">0大会</span>
        </div>
        <div id="nearestSummary">現在地を取得すると近い順で探せます</div>
        <div id="activeFilters">条件なし</div>
      </section>

      <main class="workspace">
        <section id="listPanel" class="list-panel" aria-label="店舗一覧">
          <div id="shopList" class="shop-list"></div>
        </section>

        <section id="mapPanel" class="map-panel" aria-label="地図" hidden>
          <div id="map"></div>
          <aside id="mapDrawer" class="map-drawer"></aside>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
  </body>
</html>
